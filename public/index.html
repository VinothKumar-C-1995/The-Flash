<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flash — Live Transfer</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3d;
    --accent: #7c5cfc;
    --accent2: #00e5c8;
    --accent3: #ff6b6b;
    --text: #e8e8f0;
    --muted: #666680;
    --glow: rgba(124,92,252,0.3);
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content:'';
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 20%, rgba(124,92,252,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 80%, rgba(0,229,200,0.08) 0%, transparent 60%);
    pointer-events:none; z-index:0;
  }
  .grid-bg {
    position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(124,92,252,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(124,92,252,0.04) 1px, transparent 1px);
    background-size:48px 48px;
    pointer-events:none; z-index:0;
  }
  .container { position:relative; z-index:1; max-width:900px; margin:0 auto; padding:24px 20px; }

  header {
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:40px; padding-bottom:20px; border-bottom:1px solid var(--border);
  }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon {
    width:40px; height:40px;
    background:linear-gradient(135deg,var(--accent),var(--accent2));
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:20px; box-shadow:0 0 20px var(--glow);
  }
  .logo h1 { font-size:22px; font-weight:800; letter-spacing:-0.5px; }
  .logo span { color:var(--accent); }
  .status-badge {
    display:flex; align-items:center; gap:8px;
    background:rgba(0,229,200,0.1); border:1px solid rgba(0,229,200,0.2);
    border-radius:100px; padding:6px 14px; font-size:12px;
    color:var(--accent2); font-family:'Space Mono',monospace;
  }
  .dot {
    width:7px; height:7px; border-radius:50%;
    background:var(--accent2); animation:pulse 2s infinite;
  }
  .dot.red { background:var(--accent3); }
  @keyframes pulse {
    0%,100%{opacity:1;transform:scale(1);}
    50%{opacity:0.5;transform:scale(0.8);}
  }

  /* Device name setup */
  .setup-bar {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:14px 20px;
    display:flex; align-items:center; gap:12px;
    margin-bottom:20px; flex-wrap:wrap;
  }
  .setup-bar label { font-size:12px; color:var(--muted); font-family:'Space Mono',monospace; white-space:nowrap; }
  .setup-bar input {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:7px 12px; color:var(--text);
    font-family:'Space Mono',monospace; font-size:13px;
    outline:none; transition:border-color 0.2s; flex:1; min-width:120px;
  }
  .setup-bar input:focus { border-color:var(--accent); }

  .room-section {
    display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:24px;
  }
  @media(max-width:600px){ .room-section{grid-template-columns:1fr;} }

  .card {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:24px;
    transition:border-color 0.2s;
  }
  .card:hover { border-color:var(--accent); }
  .card-label {
    font-size:11px; letter-spacing:2px; text-transform:uppercase;
    color:var(--muted); font-family:'Space Mono',monospace; margin-bottom:14px;
  }
  .room-display {
    font-family:'Space Mono',monospace; font-size:32px; font-weight:700;
    letter-spacing:8px; color:var(--accent2);
    text-shadow:0 0 20px rgba(0,229,200,0.4); margin-bottom:16px;
  }

  .btn {
    display:inline-flex; align-items:center; gap:8px;
    padding:10px 20px; border-radius:8px; border:none; cursor:pointer;
    font-family:'Syne',sans-serif; font-weight:600; font-size:14px;
    transition:all 0.2s;
  }
  .btn-primary {
    background:linear-gradient(135deg,var(--accent),#9b7dff);
    color:white; box-shadow:0 4px 20px var(--glow);
  }
  .btn-primary:hover { transform:translateY(-2px); box-shadow:0 8px 30px var(--glow); }
  .btn-ghost {
    background:transparent; border:1px solid var(--border); color:var(--text);
  }
  .btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
  .btn-sm { padding:7px 14px; font-size:12px; }
  .btn:disabled { opacity:0.4; cursor:not-allowed; transform:none !important; }

  .join-input { display:flex; gap:8px; align-items:center; margin-bottom:12px; }
  input[type="text"] {
    background:var(--surface); border:1px solid var(--border);
    border-radius:8px; padding:10px 14px; color:var(--text);
    font-family:'Space Mono',monospace; font-size:16px;
    letter-spacing:3px; width:100%; outline:none; transition:border-color 0.2s;
  }
  input[type="text"]:focus { border-color:var(--accent); }
  input[type="text"]::placeholder { letter-spacing:1px; color:var(--muted); font-size:12px; }

  .devices-bar {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:14px 20px;
    display:none; align-items:center; gap:12px;
    margin-bottom:24px; flex-wrap:wrap;
  }
  .devices-bar.visible { display:flex; }
  .devices-label { font-size:11px; color:var(--muted); font-family:'Space Mono',monospace; white-space:nowrap; }
  .device-chip {
    display:flex; align-items:center; gap:6px;
    background:rgba(124,92,252,0.12); border:1px solid rgba(124,92,252,0.3);
    border-radius:100px; padding:5px 12px;
    font-size:12px; font-family:'Space Mono',monospace;
    color:var(--accent); animation:fadeIn 0.3s ease;
  }
  @keyframes fadeIn{from{opacity:0;transform:scale(0.9);}to{opacity:1;transform:scale(1);}}

  .transfer-area {
    display:grid; grid-template-columns:1fr 1fr; gap:20px; margin-bottom:24px;
  }
  @media(max-width:640px){ .transfer-area{grid-template-columns:1fr;} }

  .panel {
    background:var(--card); border:1px solid var(--border);
    border-radius:16px; padding:24px;
  }
  .panel-title {
    font-size:13px; font-weight:700; letter-spacing:1px;
    text-transform:uppercase; color:var(--muted); margin-bottom:16px;
    display:flex; align-items:center; gap:8px;
  }
  .panel-title span { color:var(--accent2); }

  textarea {
    width:100%; background:var(--surface); border:1px solid var(--border);
    border-radius:10px; padding:14px; color:var(--text);
    font-family:'Space Mono',monospace; font-size:13px;
    line-height:1.6; resize:vertical; min-height:140px;
    outline:none; transition:border-color 0.2s;
  }
  textarea:focus { border-color:var(--accent); }
  textarea::placeholder { color:var(--muted); }

  .dropzone {
    border:2px dashed var(--border); border-radius:10px;
    padding:30px 20px; text-align:center; cursor:pointer;
    transition:all 0.2s; background:var(--surface); min-height:140px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:10px;
  }
  .dropzone:hover,.dropzone.drag-over { border-color:var(--accent); background:rgba(124,92,252,0.06); }
  .dropzone-icon { font-size:32px; }
  .dropzone p { font-size:13px; color:var(--muted); }
  .dropzone strong { color:var(--accent); font-size:13px; }

  .file-preview {
    display:flex; align-items:center; gap:10px;
    background:rgba(124,92,252,0.08); border:1px solid rgba(124,92,252,0.2);
    border-radius:8px; padding:10px 14px;
    font-size:12px; font-family:'Space Mono',monospace; margin-top:10px;
  }

  .action-row {
    display:flex; gap:12px; flex-wrap:wrap; align-items:center; margin-bottom:24px;
  }
  .ai-toggle {
    display:flex; align-items:center; gap:8px;
    margin-left:auto; font-size:13px; color:var(--muted); cursor:pointer;
  }
  .toggle {
    width:40px; height:22px; background:var(--border);
    border-radius:100px; position:relative; transition:background 0.2s;
  }
  .toggle.on { background:var(--accent); }
  .toggle::after {
    content:''; position:absolute;
    width:16px; height:16px; background:white;
    border-radius:50%; top:3px; left:3px;
    transition:transform 0.2s; box-shadow:0 1px 4px rgba(0,0,0,0.3);
  }
  .toggle.on::after { transform:translateX(18px); }

  .typing-indicator {
    font-size:12px; color:var(--accent2); font-family:'Space Mono',monospace;
    height:20px; margin-bottom:10px; opacity:0; transition:opacity 0.3s;
  }
  .typing-indicator.visible { opacity:1; }

  .feed-section { }
  .feed-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
  .feed-title { font-size:13px; font-weight:700; letter-spacing:1px; text-transform:uppercase; color:var(--muted); }
  .feed { display:flex; flex-direction:column; gap:12px; }

  .msg {
    background:var(--card); border:1px solid var(--border);
    border-radius:12px; padding:16px 20px;
    animation:slideIn 0.3s ease; position:relative; overflow:hidden;
  }
  .msg::before {
    content:''; position:absolute; left:0; top:0; bottom:0; width:3px;
  }
  .msg.sent::before { background:var(--accent); }
  .msg.received::before { background:var(--accent2); }
  .msg.ai::before { background:var(--accent3); }
  .msg.system {
    background:transparent; border-color:transparent;
    text-align:center; padding:8px;
  }
  .msg.system::before { display:none; }
  @keyframes slideIn{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}

  .msg-meta {
    display:flex; align-items:center; gap:10px;
    margin-bottom:8px; font-size:11px;
    font-family:'Space Mono',monospace; color:var(--muted);
  }
  .msg-from { color:var(--accent); font-weight:700; }
  .msg.received .msg-from { color:var(--accent2); }
  .msg.ai .msg-from { color:var(--accent3); }

  .msg-content { font-size:13px; line-height:1.6; white-space:pre-wrap; word-break:break-word; }

  .msg-file {
    display:flex; align-items:center; gap:10px;
    background:rgba(0,0,0,0.2); border-radius:8px; padding:10px 14px; margin-top:8px;
  }
  .download-btn {
    margin-left:auto; background:transparent; border:1px solid var(--border);
    border-radius:6px; padding:5px 10px; color:var(--accent2); cursor:pointer;
    font-size:11px; font-family:'Space Mono',monospace; transition:all 0.2s;
  }
  .download-btn:hover { border-color:var(--accent2); background:rgba(0,229,200,0.08); }
  .ai-badge {
    display:inline-flex; align-items:center; gap:4px;
    background:rgba(255,107,107,0.1); border:1px solid rgba(255,107,107,0.2);
    border-radius:100px; padding:2px 8px; font-size:10px;
    color:var(--accent3); font-family:'Space Mono',monospace;
  }
  .copy-btn {
    background:transparent; border:1px solid var(--border);
    border-radius:6px; padding:4px 10px; color:var(--muted); cursor:pointer;
    font-size:11px; font-family:'Space Mono',monospace;
    margin-left:auto; transition:all 0.2s;
  }
  .copy-btn:hover { border-color:var(--accent); color:var(--accent); }

  .empty-state {
    text-align:center; padding:48px; color:var(--muted);
    font-family:'Space Mono',monospace; font-size:13px;
  }
  .empty-state .big { font-size:40px; margin-bottom:12px; }

  .ai-panel {
    background:var(--card); border:1px solid rgba(255,107,107,0.2);
    border-radius:16px; padding:20px 24px; margin-bottom:20px; display:none;
  }
  .ai-panel.visible { display:block; }
  .ai-thinking {
    display:flex; align-items:center; gap:10px;
    font-size:13px; color:var(--accent3); font-family:'Space Mono',monospace;
  }
  .spinner {
    width:16px; height:16px; border:2px solid rgba(255,107,107,0.2);
    border-top-color:var(--accent3); border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  .toast {
    position:fixed; bottom:24px; right:24px;
    background:var(--card); border:1px solid var(--border);
    border-radius:10px; padding:12px 20px;
    font-size:13px; font-family:'Space Mono',monospace; color:var(--accent2);
    transform:translateY(80px); opacity:0; transition:all 0.3s ease;
    z-index:100; box-shadow:0 8px 30px rgba(0,0,0,0.4);
  }
  .toast.show { transform:translateY(0); opacity:1; }

  /* Progress bar for file upload */
  .progress-bar {
    height:3px; background:var(--border); border-radius:100px; margin-top:8px; overflow:hidden;
  }
  .progress-fill {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    border-radius:100px; transition:width 0.3s ease; width:0%;
  }
</style>
</head>
<body>
<div class="grid-bg"></div>
<div class="container">

  <!-- Header -->
  <header>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <h1>The<span> Flash </span></h1>
    </div>
    <div class="status-badge">
      <div class="dot" id="connDot"></div>
      <span id="statusText">Connecting...</span>
    </div>
  </header>

  <!-- Device name -->
  <div class="setup-bar">
    <label>YOUR DEVICE NAME:</label>
    <input type="text" id="deviceNameInput" placeholder="e.g. My Phone" maxlength="20" style="letter-spacing:0;">
  </div>

  <!-- Room section -->
  <div class="room-section">
    <div class="card">
      <div class="card-label">Create Room</div>
      <div class="room-display" id="myRoomCode">----</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        <button class="btn btn-primary btn-sm" id="createBtn" onclick="createRoom()">⚡ Create Room</button>
        <button class="btn btn-ghost btn-sm" onclick="copyRoomCode()">📋 Copy Code</button>
      </div>
    </div>
    <div class="card">
      <div class="card-label">Join a Room</div>
      <div class="join-input">
        <input type="text" id="joinCodeInput" placeholder="Enter 4-digit code" maxlength="4">
      </div>
      <button class="btn btn-primary btn-sm" id="joinBtn" onclick="joinRoom()">🔗 Join Room</button>
    </div>
  </div>

  <!-- Connected devices -->
  <div class="devices-bar" id="devicesBar">
    <span class="devices-label">CONNECTED:</span>
    <div id="devicesList" style="display:flex;gap:8px;flex-wrap:wrap;"></div>
  </div>

  <!-- Transfer panels -->
  <div class="transfer-area">
    <div class="panel">
      <div class="panel-title">✍️ <span>Send Text</span></div>
      <textarea id="textInput" placeholder="Type or paste anything — notes, links, code, secrets..." oninput="onTyping()"></textarea>
    </div>
    <div class="panel">
      <div class="panel-title">📁 <span>Send File</span></div>
      <div class="dropzone" id="dropzone" onclick="document.getElementById('fileInput').click()">
        <div class="dropzone-icon">🗂️</div>
        <p>Drop any file here</p>
        <strong>or click to browse</strong>
      </div>
      <input type="file" id="fileInput" style="display:none" onchange="handleFileSelect(event)">
      <div id="filePreview" style="display:none" class="file-preview">
        <span class="file-icon" id="fileIcon">📄</span>
        <div style="flex:1;min-width:0;">
          <div id="fileName" style="font-size:12px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;"></div>
          <div id="fileSize" style="font-size:11px;color:var(--muted);"></div>
          <div class="progress-bar" id="progressBar" style="display:none;">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
        <button class="download-btn" onclick="clearFile()">✕</button>
      </div>
    </div>
  </div>

  <!-- Action row -->
  <div class="action-row">
    <button class="btn btn-primary" id="sendBtn" onclick="sendContent()" disabled>⚡ Send Now</button>
    <button class="btn btn-ghost" onclick="clearAll()">🗑️ Clear</button>
    <div class="ai-toggle" onclick="toggleAI()">
      <div class="toggle" id="aiToggle"></div>
      <span>🤖 AI Enhance</span>
    </div>
  </div>

  <!-- AI panel -->
  <div class="ai-panel" id="aiPanel">
    <div class="ai-thinking">
      <div class="spinner"></div>
      <span id="aiStatus">AI is enhancing your content...</span>
    </div>
  </div>

  <!-- Typing indicator -->
  <div class="typing-indicator" id="typingIndicator"></div>

  <!-- Feed -->
  <div class="feed-section">
    <div class="feed-header">
      <div class="feed-title">📡 Live Transfer Feed</div>
      <button class="btn btn-ghost btn-sm" onclick="clearFeed()">Clear</button>
    </div>
    <div class="feed" id="feed">
      <div class="empty-state">
        <div class="big">📡</div>
        Create or join a room to start transferring
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Socket.io ──────────────────────────────────────────────────────────
const socket = io();
let inRoom = false;
let myRoom = null;
let aiEnabled = false;
let selectedFile = null;
let selectedFileData = null;
let typingTimer = null;

// Random device name
const adjectives = ['Swift','Bright','Cool','Fast','Bold','Chill','Smart','Quick'];
const nouns = ['Phone','Laptop','Tablet','Mac','PC','Pad','Book'];
const defaultName = adjectives[Math.floor(Math.random()*adjectives.length)] + '-' + nouns[Math.floor(Math.random()*nouns.length)];
document.getElementById('deviceNameInput').value = defaultName;

// Connection events
socket.on('connect', () => {
  document.getElementById('statusText').textContent = 'Connected';
  document.getElementById('connDot').classList.remove('red');
  showToast('Connected to server ✓');
});

socket.on('disconnect', () => {
  document.getElementById('statusText').textContent = 'Disconnected';
  document.getElementById('connDot').classList.add('red');
  document.getElementById('sendBtn').disabled = true;
  inRoom = false;
});

// Room events
socket.on('devices-update', (devices) => {
  updateDevicesUI(devices);
});

socket.on('new-message', (msg) => {
  addToFeed(msg, false);
});

socket.on('system-msg', (text) => {
  addSystemMsg(text);
});

socket.on('typing', ({ name, isTyping }) => {
  const el = document.getElementById('typingIndicator');
  if (isTyping) {
    el.textContent = `✎ ${name} is typing...`;
    el.classList.add('visible');
  } else {
    el.classList.remove('visible');
  }
});

// ── Room ───────────────────────────────────────────────────────────────
function getDeviceName() {
  return document.getElementById('deviceNameInput').value.trim() || defaultName;
}

function createRoom() {
  socket.emit('create-room', { deviceName: getDeviceName() }, (res) => {
    if (res.success) {
      myRoom = res.code;
      inRoom = true;
      document.getElementById('myRoomCode').textContent = res.code;
      document.getElementById('statusText').textContent = 'Room ' + res.code;
      document.getElementById('sendBtn').disabled = false;
      showToast('Room ' + res.code + ' created! Share the code 🎉');
    } else {
      showToast('Error creating room');
    }
  });
}

function joinRoom() {
  const code = document.getElementById('joinCodeInput').value.trim();
  if (code.length !== 4 || isNaN(code)) { showToast('Enter a valid 4-digit code'); return; }

  socket.emit('join-room', { code, deviceName: getDeviceName() }, (res) => {
    if (res.success) {
      myRoom = code;
      inRoom = true;
      document.getElementById('myRoomCode').textContent = code;
      document.getElementById('statusText').textContent = 'Room ' + code;
      document.getElementById('sendBtn').disabled = false;

      // Load history
      const feed = document.getElementById('feed');
      const empty = feed.querySelector('.empty-state');
      if (empty && res.messages.length > 0) empty.remove();
      res.messages.forEach(m => addToFeed(m, false));

      showToast('Joined room ' + code + '! 🔗');
    } else {
      showToast('Room not found. Ask the host to create it first.');
    }
  });
}

function updateDevicesUI(devices) {
  const bar = document.getElementById('devicesBar');
  const list = document.getElementById('devicesList');
  bar.classList.add('visible');
  const myName = getDeviceName();
  list.innerHTML = devices.map(d =>
    `<div class="device-chip">${d === myName ? '💻' : '📱'} ${d}</div>`
  ).join('');
}

// ── File ───────────────────────────────────────────────────────────────
function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  if (file.size > 50 * 1024 * 1024) { showToast('File too large (max 50MB)'); return; }

  selectedFile = file;
  const reader = new FileReader();
  reader.onload = ev => { selectedFileData = ev.target.result; };
  reader.readAsDataURL(file);

  document.getElementById('filePreview').style.display = 'flex';
  document.getElementById('fileName').textContent = file.name;
  document.getElementById('fileSize').textContent = formatSize(file.size);
  document.getElementById('fileIcon').textContent = getFileIcon(file.name);
}

function getFileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  const icons = { pdf:'📕',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',gif:'🎞️',mp4:'🎬',
    mp3:'🎵',zip:'📦',txt:'📄',doc:'📝',docx:'📝',xls:'📊',xlsx:'📊',
    ppt:'📊',pptx:'📊',js:'⚙️',py:'🐍',html:'🌐',css:'🎨',json:'📋',svg:'🎨' };
  return icons[ext] || '📁';
}

function formatSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(1) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function clearFile() {
  selectedFile = null; selectedFileData = null;
  document.getElementById('fileInput').value = '';
  document.getElementById('filePreview').style.display = 'none';
  document.getElementById('progressBar').style.display = 'none';
}

// Drag & drop
const dz = document.getElementById('dropzone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) handleFileSelect({ target: { files: e.dataTransfer.files } });
});

// ── Typing ─────────────────────────────────────────────────────────────
function onTyping() {
  if (!inRoom) return;
  socket.emit('typing', true);
  clearTimeout(typingTimer);
  typingTimer = setTimeout(() => socket.emit('typing', false), 1500);
}

// ── Send ───────────────────────────────────────────────────────────────
async function sendContent() {
  if (!inRoom) { showToast('Join or create a room first!'); return; }
  const text = document.getElementById('textInput').value.trim();
  if (!text && !selectedFile) { showToast('Nothing to send!'); return; }

  socket.emit('typing', false);

  if (selectedFile) {
    // Show progress
    document.getElementById('progressBar').style.display = 'block';
    document.getElementById('progressFill').style.width = '60%';
    setTimeout(() => document.getElementById('progressFill').style.width = '100%', 300);

    // Wait for file data if not ready
    if (!selectedFileData) {
      showToast('File still loading, please wait...');
      return;
    }

    socket.emit('send-file', {
      fileName: selectedFile.name,
      fileSize: formatSize(selectedFile.size),
      fileIcon: getFileIcon(selectedFile.name),
      fileData: selectedFileData
    });

    const msg = {
      id: Date.now(), sender: getDeviceName(),
      time: new Date().toLocaleTimeString(), type: 'file',
      fileName: selectedFile.name, fileSize: formatSize(selectedFile.size),
      fileIcon: getFileIcon(selectedFile.name), fileData: selectedFileData
    };
    addToFeed(msg, true);
    clearFile();
  }

  if (text) {
    if (aiEnabled) {
      await sendWithAI(text);
    } else {
      socket.emit('send-text', { content: text, aiEnhanced: false });
      addToFeed({
        id: Date.now(), sender: getDeviceName(),
        time: new Date().toLocaleTimeString(), type: 'text', content: text
      }, true);
    }
    document.getElementById('textInput').value = '';
  }
}

async function sendWithAI(text) {
  const panel = document.getElementById('aiPanel');
  panel.classList.add('visible');
  document.getElementById('aiStatus').textContent = '🤖 AI is enhancing your content...';

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        messages: [{
          role: 'user',
          content: `Improve this message to be clearer and better formatted. Return ONLY the improved message, nothing else:\n\n${text}`
        }]
      })
    });

    const data = await response.json();
    const enhanced = data.content?.map(b => b.text || '').join('') || text;
    panel.classList.remove('visible');

    socket.emit('send-text', { content: enhanced, aiEnhanced: true });
    addToFeed({
      id: Date.now(), sender: getDeviceName(),
      time: new Date().toLocaleTimeString(), type: 'ai-text', content: enhanced
    }, true);
  } catch(e) {
    panel.classList.remove('visible');
    showToast('AI error — sending as-is');
    socket.emit('send-text', { content: text, aiEnhanced: false });
    addToFeed({
      id: Date.now(), sender: getDeviceName(),
      time: new Date().toLocaleTimeString(), type: 'text', content: text
    }, true);
  }
}

// ── Feed ───────────────────────────────────────────────────────────────
function addToFeed(msg, isSent) {
  const feed = document.getElementById('feed');
  const empty = feed.querySelector('.empty-state');
  if (empty) empty.remove();

  const div = document.createElement('div');
  div.className = `msg ${isSent ? 'sent' : 'received'} ${msg.type === 'ai-text' ? 'ai' : ''}`;

  let inner = `<div class="msg-meta">
    <span class="msg-from">${escHtml(msg.sender)}</span>
    <span>${msg.time}</span>
    ${msg.type === 'ai-text' ? '<span class="ai-badge">✨ AI Enhanced</span>' : ''}
  </div>`;

  if (msg.type === 'file') {
    inner += `<div class="msg-file">
      <span style="font-size:20px;">${msg.fileIcon}</span>
      <div style="flex:1;min-width:0;">
        <div style="font-size:12px;font-weight:700;font-family:'Space Mono',monospace;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${escHtml(msg.fileName)}</div>
        <div style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace;">${msg.fileSize}</div>
      </div>
      ${msg.fileData ? `<button class="download-btn" onclick="dlFile(this)">⬇ Save</button>` : ''}
    </div>`;
    div.innerHTML = inner;
    if (msg.fileData) {
      div.querySelector('.download-btn').addEventListener('click', () => {
        downloadFile(msg.fileData, msg.fileName);
      });
    }
  } else {
    inner += `<div class="msg-content">${escHtml(msg.content)}</div>
      <div style="display:flex;margin-top:8px;">
        <button class="copy-btn" id="cb-${msg.id}">📋 Copy</button>
      </div>`;
    div.innerHTML = inner;
    div.querySelector('.copy-btn').addEventListener('click', () => {
      navigator.clipboard.writeText(msg.content).then(() => showToast('Copied!')).catch(() => showToast('Copy failed'));
    });
  }

  feed.insertBefore(div, feed.firstChild);
}

function addSystemMsg(text) {
  const feed = document.getElementById('feed');
  const div = document.createElement('div');
  div.className = 'msg system';
  div.style.cssText = 'color:var(--muted);font-size:11px;font-family:Space Mono,monospace;';
  div.textContent = '— ' + text + ' —';
  feed.insertBefore(div, feed.firstChild);
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function downloadFile(dataUrl, name) {
  const a = document.createElement('a');
  a.href = dataUrl; a.download = name; a.click();
  showToast('Saving ' + name + '...');
}

function clearFeed() {
  document.getElementById('feed').innerHTML = `<div class="empty-state"><div class="big">📡</div>Feed cleared</div>`;
}

// ── UI Helpers ─────────────────────────────────────────────────────────
function toggleAI() {
  aiEnabled = !aiEnabled;
  document.getElementById('aiToggle').classList.toggle('on', aiEnabled);
  showToast(aiEnabled ? '🤖 AI Enhancement ON' : 'AI Enhancement OFF');
}

function clearAll() {
  document.getElementById('textInput').value = '';
  clearFile();
}

function copyRoomCode() {
  if (!myRoom) { showToast('Create a room first!'); return; }
  navigator.clipboard.writeText(myRoom)
    .then(() => showToast('Code ' + myRoom + ' copied!'))
    .catch(() => showToast('Your code: ' + myRoom));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Enter to send
document.addEventListener('keydown', e => {
  if (e.ctrlKey && e.key === 'Enter') sendContent();
});
</script>
