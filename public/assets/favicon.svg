<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#C084FC"/>
      <stop offset="50%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#6C47FF"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Dark background -->
  <rect width="32" height="32" rx="6" fill="#0F0A1E"/>

  <!-- Glow circle behind bolt -->
  <circle cx="16" cy="16" r="13" fill="#6C47FF" opacity="0.15"/>

  <!-- Lightning bolt -->
  <g filter="url(#glow)">
    <polygon points="19,3 9,18 15.5,18 13,29 23,14 16.5,14" fill="url(#boltGrad)"/>
    <!-- Highlight -->
    <polygon points="17,5 11,17 14.5,17" fill="#E9D5FF" opacity="0.4"/>
  </g>
</svg>
